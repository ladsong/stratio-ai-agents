services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nanobot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nanobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nanobot}
      POSTGRES_DB: ${POSTGRES_DB:-nanobot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nanobot} -d ${POSTGRES_DB:-nanobot}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: nanobot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: ./apps/gateway/Dockerfile
    container_name: nanobot-gateway
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nanobot}:${POSTGRES_PASSWORD:-nanobot}@postgres:5432/${POSTGRES_DB:-nanobot}
      REDIS_URL: redis://redis:6379/0
      AUTH_BEARER_TOKEN: ${AUTH_BEARER_TOKEN:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-N-u9ANiJIrNt3UgWWgu1kHNTKTPoXvK5xp4eS3GGby0=}
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()'"]
      interval: 10s
      timeout: 5s
      retries: 20

  runtime:
    build:
      context: .
      dockerfile: ./apps/runtime/Dockerfile
    container_name: nanobot-runtime
    environment:
      RUNTIME_HOST: 0.0.0.0
      RUNTIME_PORT: 8010
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nanobot}:${POSTGRES_PASSWORD:-nanobot}@postgres:5432/${POSTGRES_DB:-nanobot}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${RUNTIME_PORT:-8010}:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    container_name: nanobot-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nanobot}:${POSTGRES_PASSWORD:-nanobot}@postgres:5432/${POSTGRES_DB:-nanobot}
      RUNTIME_URL: http://runtime:8010
      RQ_QUEUE_NAME: nanobot-runs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      runtime:
        condition: service_started

  migrate:
    build:
      context: ./packages/core
      dockerfile: Dockerfile
    container_name: nanobot-migrate
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nanobot}:${POSTGRES_PASSWORD:-nanobot}@postgres:5432/${POSTGRES_DB:-nanobot}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
